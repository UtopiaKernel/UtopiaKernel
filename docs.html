<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>UtopiaKernel 文档</title>
    <meta name="description" content="UtopiaKernel 文档站点" />

    <meta property="og:title" content="UtopiaKernel 文档" />
    <meta property="og:description" content="UtopiaKernel 文档站点" />
    <meta property="og:type" content="website" />

    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="stylesheet" href="./assets/styles.css" />

    <!-- Markdown & code highlight (CDN, no build step) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">跳到正文</a>

    <header class="topbar">
      <div class="topbar__left">
        <button class="icon-btn" id="sidebarToggle" aria-label="打开/关闭侧边栏" aria-expanded="true">
          <span class="icon icon--menu" aria-hidden="true"></span>
        </button>
        <a class="brand" href="#/home">
          <span class="brand__mark">UK</span>
          <span class="brand__text">UtopiaKernel 文档</span>
        </a>
      </div>
      <div class="topbar__center">
        <div class="search">
          <span class="icon icon--search" aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="搜索文档（本地快速搜索）" autocomplete="off" />
        </div>
        <div class="search-results" id="searchResults" hidden></div>
      </div>
      <div class="topbar__right">
        <a class="topbar__link" href="./">门户</a>
        <a class="topbar__link" href="https://github.com/UtopiaKernel/UtopiaKernel" target="_blank" rel="noreferrer">
          GitHub
        </a>
        <button class="icon-btn" id="themeToggle" aria-label="切换深浅色">
          <span class="icon icon--sun" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <nav class="nav" aria-label="文档导航">
          <div class="nav__section">
            <div class="nav__title">导航</div>
            <div class="nav__items" id="navItems"></div>
          </div>
        </nav>
      </aside>

      <main class="content" id="main" tabindex="-1">
        <div class="content__header">
          <div class="breadcrumbs" id="breadcrumbs"></div>
        </div>
        <article class="doc" id="doc"></article>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>
    <script type="module" src="./assets/docs/main.js"></script>
  </body>
</html>
